<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>

    <!-- daisyui link -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- google font link -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <!-- css link  -->
    <link rel="stylesheet" href="style.css" />

    <!-- fortawesome link  -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>
  <body class="bg-base-300 geist">
    <nav
      class="bg-white flex flex-col space-y-6 md:space-y-0 md:flex-row justify-between items-center px-10 py-4"
    >
      <div class="flex items-center space-x-2">
        <img class="max-w-[40px]" src="./assets/github-logo.png" alt="" />
        <p class="text-2xl font-bold">GitHub Issues Tracker</p>
      </div>

      <div class="space-x-2 flex items-center">
        <input
          id="search-issue"
          class="border-slate-400 rounded-md border p-2"
          type="text"
          placeholder="Search Issues ..."
        />
        <button
          id="search-btn"
          onclick="loadSearchProblems('search-btn')"
          class="btn btn-soft btn-primary select-btn"
        >
          Search
        </button>
      </div>
    </nav>

    <section
      class="bg-white w-10/12 mx-auto mt-10 p-5 rounded-md flex flex-col md:flex-row gap-4"
    >
      <button
        id="all-btn"
        onclick="loadProblems('all-btn')"
        class="btn btn-soft btn-primary px-11 select-btn"
      >
        All
      </button>
      <button
        id="open-btn"
        onclick="loadOpenProblems('open-btn')"
        class="btn btn-soft btn-primary px-9 select-btn"
      >
        Open
      </button>
      <button
        id="closed-btn"
        onclick="loadClosedProblems('closed-btn')"
        class="btn btn-soft btn-primary px-9 select-btn"
      >
        Closed
      </button>
    </section>

    <section
      class="bg-white w-10/12 mx-auto mt-10 p-5 rounded-md flex flex-col md:flex-row space-y-8 md:space-y-0 justify-between"
    >
      <div class="flex items-center space-x-2">
        <div>
          <img src="./assets/Aperture.png" alt="" />
        </div>
        <div>
          <p id="issueCount" class="text-xl font-bold">0 Issues</p>
          <p>Track and manage your project issues</p>
        </div>
      </div>
      <div class="flex items-center justify-center space-x-4">
        <div class="flex items-center space-x-2">
          <div><img src="./assets/green-dot.png" alt="" /></div>
          <div>Open</div>
        </div>
        <div class="flex items-center space-x-2">
          <div><img src="./assets/purple-dot.png" alt="" /></div>
          <div>closed</div>
        </div>
      </div>
    </section>

    <div class="flex justify-center my-10">
      <span
        id="loading-spinner"
        class="loading loading-spinner loading-lg text-primary hidden"
      ></span>
    </div>

    <section
      id="problems-box"
      class="bg-white w-10/12 mx-auto mt-10 p-5 rounded-md grid grid-cols-1 md:grid-cols-3 gap-5"
    ></section>

    <script src="main.js"></script>
  </body>
</html>
