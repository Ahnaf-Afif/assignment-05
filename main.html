      rel="stylesheet"
      type="text/css"
    />

    <!-- google font link -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />

    <!-- css link  -->

  <body class="bg-base-300 h-screen">
    <nav class="bg-white flex justify-between items-center px-10 py-4">
      <div class="flex items-center space-x-2">
        <img class="max-w-[40px]" src="./assets/github-logo.png" alt="" />
        <p class="text-2xl font-bold">GitHub Issues Tracker</p>
      </div>

      <div class="space-x-2 flex items-center">
        <input
          class="border-slate-400 rounded-md border p-2"
          type="text"
          placeholder="Search Issues ..."
        />
        <button class="btn btn-primary">Primary</button>
      </div>
    </nav>

    <section class="bg-white w-10/12 mx-auto mt-10 p-5 rounded-md">
      <button onclick="loadProblems()" class="btn btn-soft btn-primary px-11">
        All
      </button>
      <button
        onclick="loadOpenProblems()"
        class="btn btn-soft btn-primary px-9"
      >
        Open
      </button>
      <button
        onclick="loadClosedProblems()"
        class="btn btn-soft btn-primary px-9"
      >
        Closed
      </button>
    </section>

    <section
      class="bg-white w-10/12 mx-auto mt-10 p-5 rounded-md flex justify-between"
    >
      <div class="flex items-center space-x-2">
        <div>
          <img src="./assets/Aperture.png" alt="" />
        </div>
        <div>
          <p id="issueCount" class="text-xl font-bold">0 Issues</p>
          <p>Track and manage your project issues</p>
        </div>
      </div>
      <div class="flex items-center space-x-4">
        <div class="flex items-center space-x-2">
          <div><img src="./assets/green-dot.png" alt="" /></div>
          <div>Open</div>
        </div>
        <div class="flex items-center space-x-2">
          <div><img src="./assets/purple-dot.png" alt="" /></div>
          <div>closed</div>
        </div>
      </div>
    </section>

    <section
      id="problems-box"
      class="bg-white w-10/12 mx-auto mt-10 p-5 rounded-md grid grid-cols-1 md:grid-cols-3 gap-5"
    ></section>
